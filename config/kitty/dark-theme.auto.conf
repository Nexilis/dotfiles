# Applied automatically when macOS is in Dark mode.
# This is the original custom dark theme that used to live inline in kitty.conf.

macos_titlebar_color #1d1d1d

background            #1d1d1d
foreground            #f7f6ec
cursor                #eccf4f
selection_background  #165776
selection_foreground  #1d1d1d

# Bright variants (8-15) lightened for WCAG AA contrast (>=4.5:1) against the
# #1d1d1d background; they were darker than their normal pairs originally.
# Verified with tools/contrast. color0 stays a near-black swatch (1.42:1).
color0                #343835
color8                #8a8d8a
color1                #de5e7c
color9                #d18ea6
color2                #7bb75b
color10               #9fcf6f
color3                #e8b32a
color11               #f0c75a
color4                #4c99d3
color12               #6fb3e0
color5                #a57fc4
color13               #c3a0e0
color6                #389aac
color14               #76bbca
color7                #f9faf6
color15               #b1b5ae
