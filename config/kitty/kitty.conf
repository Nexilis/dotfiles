font_family Hack Regular Nerd Font Complete
font_size 12.0
strip_trailing_spaces smart
tab_bar_style separator
tab_separator " | "
tab_title_template {index}: {title}
confirm_os_window_close 0
enabled_layouts grid

# Colors are set automatically based on the macOS Appearance setting.
# See dark-theme.auto.conf (Dark mode) and light-theme.auto.conf (Light mode).
# kitty applies the matching *.auto.conf file with no include needed.
#
# Gotcha: after adding/renaming the *.auto.conf files, a full restart (Cmd+Q)
# is needed for first activation. "Reload preferences" only re-reads kitty.conf;
# it does not re-run the OS color-scheme query that picks the auto file.
# Once restarted, live light/dark switching works without further restarts.
# All color edits must go in the *.auto.conf files; they override colors set here.
