# yazi theme overrides. Merges over yazi's default theme.
#
# Contrast fix: yazi's default tab styling uses the named ANSI "blue", which
# kitty's light theme renders as a dark blue with low-contrast text on top.
# These tabs use fixed hex colours with their own background, so they stay
# readable regardless of the kitty light/dark background behind them.
[tabs]
active   = { fg = "#11111b", bg = "#fab387", bold = true }
inactive = { fg = "#cdd6f4", bg = "#45475a" }

# Same fix for the bottom status-bar mode indicator. yazi's default mode style
# uses bare named colours (bg = "blue"/"red") with no fg, so the dark default
# text lands on a dark-ish background. These pills get fixed hex fg+bg, and the
# "alt" segments reuse the inactive-tab colours, so both bottom corners stay
# readable in either kitty theme. select/unset are styled too for consistency.
[mode]
normal_main = { fg = "#11111b", bg = "#89b4fa", bold = true }
normal_alt  = { fg = "#cdd6f4", bg = "#45475a" }
select_main = { fg = "#11111b", bg = "#a6e3a1", bold = true }
select_alt  = { fg = "#cdd6f4", bg = "#45475a" }
unset_main  = { fg = "#11111b", bg = "#f9e2af", bold = true }
unset_alt   = { fg = "#cdd6f4", bg = "#45475a" }

# Same fix for the which-key popup (the prefix-key hint bar at the bottom).
# yazi's default mask is a medium grey-purple (#5c5f77) with dim text on top,
# so on the light kitty theme the keys and descriptions barely read. Pin a solid
# dark mask with bright fg + a peach accent for the candidate keys, so the popup
# is high-contrast and self-contained regardless of the kitty background.
[which]
mask            = { bg = "#1e1e2e" }
cand            = { fg = "#fab387", bold = true }
rest            = { fg = "#6c7086" }
desc            = { fg = "#cdd6f4" }
separator_style = { fg = "#6c7086" }
